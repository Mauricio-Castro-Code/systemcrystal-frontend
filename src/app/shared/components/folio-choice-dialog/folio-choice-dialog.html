<div class="folio-dialog">
  <div class="folio-dialog__icon-wrap">
    <mat-icon>tag</mat-icon>
  </div>

  <h2 class="folio-dialog__title" mat-dialog-title>Elige el folio de la nota</h2>

  <mat-dialog-content class="folio-dialog__content">
    <p class="folio-dialog__message">
      Hay folios libres en la numeración (huecos de notas eliminadas). Elige en qué
      hueco quieres colocar esta nota o continúa con el siguiente folio.
    </p>

    @if (data.gaps.length) {
      <span class="folio-dialog__section-label">Huecos disponibles</span>
      <div class="folio-dialog__gaps">
        @for (gap of data.gaps; track gap.value) {
          <button
            type="button"
            class="folio-dialog__gap"
            (click)="chooseGap(gap)"
          >
            {{ gap.folio }}
          </button>
        }
      </div>
    }

    <button
      type="button"
      class="folio-dialog__option folio-dialog__option--sequential"
      (click)="chooseSequential()"
    >
      <span class="folio-dialog__option-label">Secuencial</span>
      <strong class="folio-dialog__option-folio">{{ data.sequentialFolio }}</strong>
      <span class="folio-dialog__option-hint">Continúa después del último folio</span>
    </button>
  </mat-dialog-content>

  <mat-dialog-actions class="folio-dialog__actions">
    <button
      class="folio-dialog__cancel"
      mat-stroked-button
      type="button"
      (click)="cancel()"
    >
      Cancelar
    </button>
  </mat-dialog-actions>
</div>
