<div class="toast" [attr.data-variant]="data.variant" role="status">
  <mat-icon class="toast__icon">{{ icon }}</mat-icon>

  <span class="toast__message">{{ data.message }}</span>

  @if (data.actionLabel) {
    <button class="toast__action" mat-button type="button" (click)="runAction()">
      {{ data.actionLabel }}
    </button>
  }

  <button
    class="toast__close"
    type="button"
    aria-label="Cerrar aviso"
    (click)="dismiss()"
  >
    <mat-icon>close</mat-icon>
  </button>
</div>
