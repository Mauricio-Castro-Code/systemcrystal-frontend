<div class="main-layout">
  <div
    class="main-layout__backdrop"
    *ngIf="isSidebarOpen()"
    (click)="closeSidebar()"
  ></div>

  <app-sidebar
    [navigationItems]="navigationItems()"
    [activeItemId]="activeItemId()"
    [userName]="userSession()?.displayName ?? 'Equipo Crystal Alquiler'"
    [isMobileOpen]="isSidebarOpen()"
    (requestClose)="closeSidebar()"
    (logoutRequested)="signOut()"
  />

  <section class="main-layout__content-shell">
    <header class="main-layout__topbar">
      <button
        class="main-layout__menu-toggle"
        type="button"
        aria-label="Abrir menu lateral"
        (click)="toggleSidebar()"
      >
        <app-icon name="menu" />
      </button>
      <span class="main-layout__topbar-title">{{ activePageTitle() }}</span>
    </header>

    <main class="main-layout__content">
      <router-outlet />
    </main>
  </section>
</div>
